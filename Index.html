<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoxGuardAI - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/variable.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="main-container">
        <section class="welcome-side">
            <div class="image-overlay"></div>
            <div class="content">
                <h1>Welcome to <span>BoxGuardAI!</span></h1>
                <p>IoT-based Integrated Embedded AI System for Packaging Box Quality Control</p>
            </div>
            
            <div class="wave-divider">
             <svg viewBox="0 0 100 100" preserveAspectRatio="none">
                 <path d="M0 0 C 50 0, 50 100, 100 100 L 100 0 Z" fill="white"></path>
             </svg>
          </div>
        </section>

        <section class="login-side">
            <div class="bg-circle"></div>

            <div class="login-box">
                <h2>Login</h2>
                <p class="subtitle">Please enter your details below</p>

                <form id="loginForm">
                    <div class="input-group">
                        <label>Username</label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-user"></i>
                            <input type="text" id="username" placeholder="Enter username" required>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label>Password</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="password" placeholder="Enter password" required>
                        </div>
                        <div class="forgot-wrapper">
                            <a href="#" class="forgot">Forgot password?</a>
                        </div>
                    </div>

                    <button type="submit" class="btn-login">LOGIN</button>
                </form>

                <div class="footer-text">
                    <p>&copy; 2026 BoxGuardAI System</p>
                </div>
            </div>
        </section>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
